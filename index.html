<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>notwotwix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="layout">
    <section class="bio-card">
      <header class="bio-card__header">
        <img class="bio-card__avatar" src="avatar.jpg" alt="Avatar">
        <div>
          <h1 class="bio-card__text">notwotwix</h1>
          <p class="role">𝗺𝗮𝗹𝗼𝗶#𝘀𝟔𝘅</p>
        </div>
      </header>

      <div class="actions">
        <a class="button button--primary" href="https://t.me/Waspola" target="_blank" rel="noreferrer">
          Telegram
        </a>
        <a class="button button--primary" href="https://discord.com/users/waspola">
          Discord
        </a>
        <a class="button button--primary" href="https://youtube.com/@notwotwix">
          Youtube
        </a>
      </div>
    </section>
  </main>
    <div id="splash-screen">
        <button class="splash-button" id="start-button" type="button">CLICK!</button>
    </div>

    <audio id="background-audio" loop preload="auto">
        <source src="sosl.mp3" type="audio/mpeg">
    </audio>

    <script>
        const splashScreen = document.getElementById('splash-screen');
        const startButton = document.getElementById('start-button');
        const video = document.getElementById('background-video');
        const audio = document.getElementById('background-audio');
        let started = false;

        function startExperience() {
            if (started) return;
            started = true;

            document.body.classList.add('started');
            splashScreen.classList.add('splash-hidden');
            setTimeout(() => splashScreen.remove(), 620);

            
            audio.volume = 0.1;
            audio.play().catch(() => {});
        }

        startButton.addEventListener('click', startExperience);
        window.addEventListener('load', () => {
        });
    </script>
</body>
</html>
